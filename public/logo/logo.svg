<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" role="img">
<title>The Hiring Rebels — horizontal logo</title>
<desc>Horizontal combination mark: a charcoal rounded block connected by a diagonal to a red pointed shard, followed by the wordmark "The Hiring Rebels" with the H and R set in red.</desc>

<g transform="translate(-17.04,-5.35) scale(1.1688)">
  <rect x="18" y="38" width="20" height="47" rx="4" fill="#1A1A1A"/>
  <polygon points="38,50 62,30 62,46 38,66" fill="#1A1A1A"/>
  <polygon points="62,85 82,85 82,22 72,8 62,22" fill="#E63946"/>
</g>

<text x="100" y="57" font-family="Arial, Helvetica, sans-serif">
  <tspan font-size="16" font-weight="500" fill="#9A9A95">The </tspan><tspan font-size="30" font-weight="800" letter-spacing="0.3" fill="#E63946">H</tspan><tspan font-size="30" font-weight="800" letter-spacing="0.3" fill="#1A1A1A">iring </tspan><tspan font-size="30" font-weight="800" letter-spacing="0.3" fill="#E63946">R</tspan><tspan font-size="30" font-weight="800" letter-spacing="0.3" fill="#1A1A1A">ebels</tspan>
</text>
</svg>